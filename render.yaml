services:
  - type: web
    name: accomplist
    env: docker                  # Docker instead of native php (no longer supported)
    region: singapore            # Closest to Philippines
    plan: free
    dockerfilePath: ./Dockerfile # Path to your Dockerfile
    envVars:
      - key: APP_NAME
        value: AccompList
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://accomplist.onrender.com  # Update after first deploy if URL differs
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: accomplist-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: accomplist-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: accomplist-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: accomplist-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: accomplist-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr            # Render streams logs from stderr

databases:
  - name: accomplist-db
    databaseName: accomplist
    user: accomplist_user
    region: singapore
    plan: free