services:
  - type: web
    name: accomplist
    env: php
    region: singapore
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "cd /var/www && php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_NAME
        value: AccompList
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: accomplist-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: accomplist-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: accomplist-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: accomplist-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: accomplist-db
          property: password

databases:
  - name: accomplist-db
    databaseName: accomplist
    user: accomplist_user
    region: singapore
    plan: free