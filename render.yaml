services:
  - type: web
    name: accomplist-app
    runtime: docker
    plan: free
    preDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: accomplist-app
          property: host
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: accomplist-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie

databases:
  - name: accomplist-db
    plan: free
    databaseName: accomplist
    user: admin
